services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: ai_agent
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: ragdb
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:alpine
    container_name: ai_agent_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
