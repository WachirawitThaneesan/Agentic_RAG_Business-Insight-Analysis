<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuckDB Warehouse Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a2236;
            --bg-input: #0d1321;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --border: rgba(99, 102, 241, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #6366f1, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header h1::before { content: "🦆"; -webkit-text-fill-color: initial; }

        .status-bar {
            display: flex;
            gap: 1.5rem;
            font-size: 0.85rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-dim);
        }

        .stat .value {
            color: var(--accent);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .card-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-header h2 {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-body { padding: 1.5rem; }

        /* SQL Editor */
        .sql-editor {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .sql-input {
            width: 100%;
            min-height: 100px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.9rem;
            padding: 1rem;
            resize: vertical;
            transition: border-color 0.2s;
        }

        .sql-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }

        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover { color: var(--text); border-color: var(--accent); }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        /* Quick queries */
        .quick-queries {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .quick-btn {
            padding: 0.4rem 0.8rem;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 20px;
            color: #818cf8;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--accent);
        }

        /* Results table */
        .results-wrapper {
            overflow-x: auto;
            margin-top: 1rem;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .results-table th {
            background: var(--bg-secondary);
            padding: 0.7rem 1rem;
            text-align: left;
            font-weight: 600;
            color: #818cf8;
            border-bottom: 2px solid var(--accent);
            white-space: nowrap;
        }

        .results-table td {
            padding: 0.6rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .results-table tr:hover td {
            background: rgba(99, 102, 241, 0.05);
        }

        .results-table .numeric {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .result-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 0;
            color: var(--text-dim);
            font-size: 0.82rem;
        }

        .badge {
            display: inline-flex;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-success { background: rgba(16,185,129,0.15); color: #34d399; }
        .badge-error { background: rgba(239,68,68,0.15); color: #f87171; }

        .error-msg {
            padding: 1rem;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 8px;
            color: #f87171;
            font-size: 0.85rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
        }

        .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .schema-block {
            background: var(--bg-input);
            border-radius: 8px;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.82rem;
            white-space: pre-wrap;
            color: var(--text-dim);
            max-height: 300px;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 1rem; }
            .status-bar { flex-wrap: wrap; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>DuckDB Warehouse Explorer</h1>
        <div class="status-bar" id="statusBar">
            <div class="stat">📊 Records: <span class="value" id="totalRecords">-</span></div>
            <div class="stat">📁 Documents: <span class="value" id="totalDocs">-</span></div>
            <div class="stat">📅 Years: <span class="value" id="availableYears">-</span></div>
        </div>
    </div>

    <div class="container">
        <!-- SQL Editor -->
        <div class="card">
            <div class="card-header">
                <h2>🔍 SQL Query</h2>
                <div class="btn-row">
                    <button class="btn btn-success" onclick="syncWarehouse()">🔄 Sync from PG</button>
                </div>
            </div>
            <div class="card-body sql-editor">
                <div class="quick-queries">
                    <button class="quick-btn" onclick="setQuery(`SELECT * FROM fact_financial_metrics LIMIT 50`)">📋 All Facts</button>
                    <button class="quick-btn" onclick="setQuery(`SELECT DISTINCT row_label FROM fact_financial_metrics ORDER BY row_label`)">🏷️ All Labels</button>
                    <button class="quick-btn" onclick="setQuery(`SELECT DISTINCT metric_year FROM fact_financial_metrics ORDER BY metric_year`)">📅 Years</button>
                    <button class="quick-btn" onclick="setQuery(`SELECT DISTINCT table_name, COUNT(*) as cnt FROM fact_financial_metrics GROUP BY table_name ORDER BY cnt DESC`)">📊 Tables</button>
                    <button class="quick-btn" onclick="setQuery(`SELECT row_label, metric_year, raw_value, unit FROM fact_financial_metrics WHERE row_label LIKE '%สินทรัพย์รวม%' ORDER BY metric_year`)">🏦 สินทรัพย์รวม</button>
                    <button class="quick-btn" onclick="setQuery(`SELECT row_label, metric_year, raw_value, numeric_value, unit FROM fact_financial_metrics WHERE unit = '%' ORDER BY row_label, metric_year`)">📈 อัตราส่วน (%)</button>
                    <button class="quick-btn" onclick="setQuery(`SELECT * FROM dim_documents`)">📁 Documents</button>
                    <button class="quick-btn" onclick="setQuery(`SELECT * FROM dim_tables`)">📑 Tables Dim</button>
                    <button class="quick-btn" onclick="setQuery(`SELECT row_label, col_name, col_value FROM dim_table_rows ORDER BY row_index, col_name LIMIT 50`)">🔎 Lookup Data</button>
                </div>
                <textarea class="sql-input" id="sqlInput" placeholder="SELECT * FROM fact_financial_metrics LIMIT 20">SELECT * FROM fact_financial_metrics LIMIT 20</textarea>
                <div class="btn-row">
                    <button class="btn btn-primary" onclick="runQuery()">▶ Run Query</button>
                    <button class="btn btn-secondary" onclick="document.getElementById('sqlInput').value=''">✕ Clear</button>
                </div>
                <div id="results"></div>
            </div>
        </div>

        <!-- Schema -->
        <div class="card">
            <div class="card-header">
                <h2>📐 Schema</h2>
                <button class="btn btn-secondary" onclick="loadSchema()">Refresh</button>
            </div>
            <div class="card-body">
                <pre class="schema-block" id="schemaBlock">Loading...</pre>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;

        async function loadStatus() {
            try {
                const res = await fetch(`${API}/api/warehouse/status`);
                const data = await res.json();
                document.getElementById('totalRecords').textContent = data.total_fact_records?.toLocaleString() || '0';
                document.getElementById('totalDocs').textContent = data.total_documents || '0';
                document.getElementById('availableYears').textContent = (data.available_years || []).join(', ') || '-';
            } catch (e) {
                console.error('Status load failed:', e);
            }
        }

        async function loadSchema() {
            try {
                const res = await fetch(`${API}/api/warehouse/schema`);
                const data = await res.json();
                document.getElementById('schemaBlock').textContent = data.schema || 'No schema available';
            } catch (e) {
                document.getElementById('schemaBlock').textContent = `Error: ${e.message}`;
            }
        }

        function setQuery(sql) {
            document.getElementById('sqlInput').value = sql;
            runQuery();
        }

        async function runQuery() {
            const sql = document.getElementById('sqlInput').value.trim();
            if (!sql) return;

            const container = document.getElementById('results');
            container.innerHTML = '<div style="padding:1rem;color:var(--text-dim)"><span class="loader"></span> Running...</div>';

            try {
                const res = await fetch(`${API}/api/warehouse/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql }),
                });
                const data = await res.json();

                if (data.error) {
                    container.innerHTML = `<div class="error-msg">❌ ${data.error}</div>`;
                    return;
                }

                if (!data.rows || data.rows.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="icon">📭</div>No results</div>';
                    return;
                }

                const columns = data.columns || Object.keys(data.rows[0]);
                const numericCols = new Set();
                for (const col of columns) {
                    const val = data.rows[0][col];
                    if (typeof val === 'number') numericCols.add(col);
                }

                let html = `
                    <div class="result-info">
                        <span><span class="badge badge-success">✓</span> ${data.row_count} row${data.row_count > 1 ? 's' : ''} returned</span>
                    </div>
                    <div class="results-wrapper">
                        <table class="results-table">
                            <thead><tr>${columns.map(c => `<th>${c}</th>`).join('')}</tr></thead>
                            <tbody>
                `;

                for (const row of data.rows) {
                    html += '<tr>';
                    for (const col of columns) {
                        const val = row[col];
                        const cls = numericCols.has(col) ? ' class="numeric"' : '';
                        const display = val === null || val === undefined ? '-' : String(val);
                        html += `<td${cls}>${display}</td>`;
                    }
                    html += '</tr>';
                }

                html += '</tbody></table></div>';
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = `<div class="error-msg">❌ Connection error: ${e.message}</div>`;
            }
        }

        async function syncWarehouse() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ Syncing...';

            try {
                const res = await fetch(`${API}/api/warehouse/sync`, { method: 'POST' });
                const data = await res.json();
                btn.textContent = `✅ ${data.fact_records} records`;
                setTimeout(() => { btn.textContent = '🔄 Sync from PG'; btn.disabled = false; }, 3000);
                loadStatus();
            } catch (e) {
                btn.textContent = '❌ Failed';
                setTimeout(() => { btn.textContent = '🔄 Sync from PG'; btn.disabled = false; }, 3000);
            }
        }

        // Init
        loadStatus();
        loadSchema();
        runQuery();
    </script>
</body>
</html>
